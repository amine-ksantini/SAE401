<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slither Battle Royale - Arena</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Conteneur pour s'assurer que le ratio 3:2 reste centré et visible en CSS */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0a0a0a;
        }
        canvas {
            display: block;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            /* Downscaling via CSS, tout en laissant le contexte interne à 3000x2000 */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <!-- Canvas fixé comme demandé en 3000x2000 par le rendu -->
        <canvas id="gameCanvas" width="3000" height="2000"></canvas>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="arena.js"></script>
</body>
</html>
