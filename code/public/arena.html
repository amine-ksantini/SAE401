<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slither Battle Royale - Arena</title>
    <link rel="icon" href="/logo-transparent.png" type="image/png">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #countdown-number {
            font-size: 30vw;
            font-family: 'Impact', sans-serif;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 0 0 50px red;
        }
        @keyframes heartbeat {
            0% { transform: scale(0.8); opacity: 0; }
            20% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 100px red; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        .pulse-anim {
            animation: heartbeat 1s infinite ease-out;
        }
    </style>
</head>
<body>
    <div id="lobby-screen" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; font-family: 'Inter', Arial, sans-serif;">
        <img src="/logo-transparent.png" alt="Emoji Slither Logo" style="height: 150px; margin-bottom: 20px; filter: drop-shadow(0px 5px 15px rgba(0,0,0,0.5));">
        <h2 style="font-size: 32px; margin-top: 0; margin-bottom: 10px; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); text-transform: uppercase;">EN ATTENTE DES JOUEURS</h2>
        <h2 id="player-count" style="font-size: 24px; color: #aaa; margin-bottom: 20px;">0 joueur(s) prêt(s)</h2>
        <ul id="player-list" style="list-style: none; padding: 0; font-size: 20px; max-height: 40vh; overflow-y: auto; text-align: center; margin-bottom: 30px;">
        </ul>
        <button id="btn-start" style="padding: 15px 40px; font-size: 24px; font-weight: bold; background-color: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0px 5px 15px rgba(0,0,0,0.5);">LANCER LA PARTIE</button>
    </div>
    <div id="countdown-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.4) 100%); flex-direction: column; align-items: center; justify-content: center; z-index: 3500; font-family: 'Inter', Arial, sans-serif; pointer-events: none;">
        <div id="countdown-number">5</div>
    </div>
    
    <div id="canvas-container">
        <!-- Canvas fixé comme demandé en 3000x2000 par le rendu -->
        <canvas id="gameCanvas" width="3000" height="2000"></canvas>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="/sounds/sounds.js"></script>
    <script src="arena.js"></script>
</body>
</html>
